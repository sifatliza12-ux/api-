<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API Builder</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <div class="popup-shell">
        <div class="brand-mark">API</div>

        <div class="header">
            <h1>API Builder</h1>
            <p class="subtitle">Build, Manage & Sell APIs</p>
        </div>

        <form class="login-form" novalidate>
            <label class="field">
                <span>Email</span>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
            </label>

            <label class="field">
                <span>Password</span>
                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
            </label>

            <button type="button" id="login-btn" class="btn btn-primary">Login</button>
            <button type="button" id="trial-btn" class="btn btn-secondary">Continue with Free Trial</button>
        </form>

        <p class="footer">Version 1.0.0</p>
    </div>

    <script src="popup.js"></script>
</body>
</html>
