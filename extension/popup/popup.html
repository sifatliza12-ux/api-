<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Craft Api</title>
    <link rel="stylesheet" href="popup.css">
</head>
<body>
    <main class="popup-shell">
        <div class="ambient ambient-one"></div>
        <div class="ambient ambient-two"></div>

        <section class="hero" aria-label="Craft Api intro">
            <div class="brand-mark" aria-hidden="true">CF</div>
            <div class="hero-copy">
                <p class="eyebrow">AI-powered workflow platform</p>
                <h1>ForgeFlow</h1>
                <p class="subtitle">Turn Workflows into APIs.</p>
            </div>
        </section>

        <form class="login-form" novalidate>
            <label class="field">
                <span>Email</span>
                <input type="email" id="email" name="email" placeholder="you@example.com" autocomplete="email">
            </label>

            <label class="field">
                <span>Password</span>
                <input type="password" id="password" name="password" placeholder="Enter your password" autocomplete="current-password">
            </label>

            <button type="button" id="login-btn" class="btn btn-primary">Login</button>
            <button type="button" id="trial-btn" class="btn btn-secondary">Continue with Free Trial</button>
        </form>

        <p class="footer">Version 1.0.0</p>
    </main>

    <script src="popup.js"></script>
</body>
</html>
