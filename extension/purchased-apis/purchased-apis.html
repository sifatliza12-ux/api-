<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ForgeFlow — Purchased APIs</title>
    <script src="../shared/theme.js"></script>
    <link rel="stylesheet" href="../marketplace/marketplace.css">
    <link rel="stylesheet" href="../shared/nav.css">
    <link rel="stylesheet" href="../shared/theme.css">
</head>
<body>
    <div class="page-shell">
        <header class="topbar">
            <div class="brand-group">
                <div class="brand-mark" aria-hidden="true">FF</div>
                <div class="brand-copy">
                    <p class="eyebrow">ForgeFlow</p>
                    <h1>Purchased APIs</h1>
                </div>
            </div>
            <div class="topbar-actions">
                <p class="topbar-subtitle">Every API you own — bought from the Marketplace or added for free — ready to run any time.</p>
                <button type="button" id="refresh-btn" class="btn btn-secondary" aria-label="Refresh purchased APIs">Refresh</button>
            </div>
        </header>

        <nav class="app-nav" id="app-nav" aria-label="Primary navigation"></nav>

        <main class="page-content">
            <p class="usage-note" id="auth-note" hidden></p>

            <section class="marketplace-section" aria-label="Your purchased APIs">
                <div class="section-heading">
                    <h2>Purchased APIs</h2>
                    <span class="result-count" id="purchased-result-count"></span>
                </div>
                <div id="purchased-grid" class="marketplace-grid"></div>
            </section>

            <p class="footer-note">Looking for something new? Browse the Marketplace — every purchase you make shows up here automatically.</p>
        </main>
    </div>

    <script src="../shared/nav.js"></script>
    <script src="../shared/preferences.js"></script>
    <script src="purchased-apis.js"></script>
</body>
</html>
